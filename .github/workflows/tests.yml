name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure no Python cache artifacts are committed
        run: |
          if git ls-files | grep -E '(^|/)(__pycache__/|.*\.py[co]$)'; then
            echo "Cache artifacts are tracked. Remove them from git."
            exit 1
          fi

  pytest-matrix:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: guardrails
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install pytest-cov

      - name: Run pytest with coverage
        run: |
          python -m pytest --cov=engine --cov-report=xml --cov-report=term-missing

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml

  docker-make-test:
    name: make test (Docker path)
    runs-on: ubuntu-latest
    needs: guardrails
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run make test
        run: make test
