# CI (SCRUM-72 / MDC-013)
#
# Jobs:
# - guardrails: block accidental __pycache__ / .pyc additions on changed files.
# - pytest-matrix: default suite on Python 3.12 + 3.13 with coverage (excludes
#   tests marked golden_corpus so PR signal stays fast and deterministic).
# - golden-regression: runs only @pytest.mark.golden_corpus — real sample-docs
#   XML baselines + harness smoke (see tests/test_sample_docs_corpus_baseline.py,
#   tests/test_golden_corpus_harness.py). Full local run: pytest with no -m filter.
# - docker-make-test: same full pytest as developers using `make test`.
#
# Subtasks: SCRUM-73 (dedicated golden job), SCRUM-74 (artifacts), SCRUM-75 (this block).

name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure no new Python cache artifacts are added
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            RANGE="$BASE_SHA...HEAD"
          else
            BEFORE_SHA="${{ github.event.before }}"
            RANGE="$BEFORE_SHA...HEAD"
          fi

          ADDED_CACHE_FILES="$(git diff --name-status "$RANGE" | awk '$1=="A"{print $2}' | grep -E '(^|/)(__pycache__/|.*\.py[co]$)' || true)"
          if [ -n "$ADDED_CACHE_FILES" ]; then
            echo "New cache artifacts were added:"
            echo "$ADDED_CACHE_FILES"
            exit 1
          fi

  pytest-matrix:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: guardrails
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install pytest-cov

      - name: Run pytest with coverage (excluding golden_corpus)
        run: |
          python -m pytest -m "not golden_corpus" --cov=engine --cov-report=xml --cov-report=term-missing

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml

  golden-regression:
    name: golden regression (sample-docs + harness)
    runs-on: ubuntu-latest
    needs: guardrails
    # Single Python version keeps golden job deterministic and fast (SCRUM-74).
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run golden_corpus-marked tests
        run: |
          set -o pipefail
          python -m pytest -m golden_corpus -v --tb=short 2>&1 | tee golden-regression.log

      - name: Upload golden regression log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: golden-regression-log
          path: golden-regression.log

  docker-make-test:
    name: make test (Docker path)
    runs-on: ubuntu-latest
    needs: guardrails
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run make test
        run: make test
