# Dedicated golden / sample-docs regression pipeline (SCRUM-72 / SCRUM-73).
# Runs in parallel with `.github/workflows/tests.yml` (CI). Repo settings can
# require both checks on `main` if desired.
#
# Scope: `pytest -m golden_corpus` only — see tests/test_sample_docs_corpus_baseline.py,
# tests/test_golden_corpus_harness.py, and tests/test_golden_corpus_snapshot.py.
#
# Mode: "full" when committed sample-docs are present (baseline + real-pair smoke +
# golden_corpus_expected.json snapshot count regression);
# otherwise corpus paths skip and synthetic harness tests still run (job stays green).
# Main CI (`tests.yml`) excludes this marker for speed; `docker-make-test` runs the
# full suite including these tests.

name: Golden regression

# workflow_dispatch: Actions → Golden regression → Run workflow (manual retrigger).
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golden-non-snapshot:
    name: golden regression (non-snapshot)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run golden_corpus tests excluding snapshot pairs
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -o pipefail
          # --capture=tee-sys: show progress while still capturing failures (default capture hides output until each test ends).
          python -m pytest -m golden_corpus -k "not test_golden_harness_emit_counts_match_committed_baseline" -v --tb=short --durations=15 --capture=tee-sys 2>&1 | tee golden-regression-non-snapshot.log

      - name: Upload golden regression log (non-snapshot)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: golden-regression-non-snapshot-log
          path: golden-regression-non-snapshot.log

  golden-snapshot:
    name: golden regression (snapshot ${{ matrix.pair_id }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pair_id:
          - email1-bladder
          - email1-cervical
          - email2-v940
          - email3-protocol-1026
          - email3-protocol-7902
          - email3-ib-6-8
          - email3-ib-10-11
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run snapshot regression for one pair
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -o pipefail
          # Large IB pairs can run 20–40+ min; tee-sys + unbuffered Python avoids a silent log that looks stuck.
          python -m pytest -m golden_corpus -k "test_golden_harness_emit_counts_match_committed_baseline and ${{ matrix.pair_id }}" -v --tb=short --durations=15 --capture=tee-sys 2>&1 | tee golden-regression-snapshot-${{ matrix.pair_id }}.log

      - name: Upload golden regression log (snapshot)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: golden-regression-snapshot-${{ matrix.pair_id }}-log
          path: golden-regression-snapshot-${{ matrix.pair_id }}.log
